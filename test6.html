<body class="min-h-screen flex flex-col">

    <header class="border-b border-slate-700 p-4 flex justify-between items-center bg-slate-900">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold">OC</div>
            <h1 class="text-xl font-bold">Studio O.C.</h1>
        </div>
        <div class="text-sm text-slate-400">Beta v0.1</div>
    </header>

    <main class="flex-1 flex p-6 gap-6 overflow-hidden">
        
        <aside class="w-1/4 flex flex-col gap-4">
            <h2 class="text-slate-400 font-bold uppercase text-xs tracking-wider">Cast (Characters)</h2>
            
            <div class="glass p-4 rounded-xl flex gap-3 items-center cursor-pointer hover:bg-slate-800 transition">
                <img src="https://via.placeholder.com/100" class="w-16 h-16 rounded-md object-cover bg-slate-700">
                <div>
                    <div class="font-bold">主人公 (ヒロ)</div>
                    <div class="text-xs text-slate-400">Ref: Full Body</div>
                </div>
            </div>

            <div class="glass p-4 rounded-xl flex gap-3 items-center cursor-pointer hover:bg-slate-800 transition">
                <img src="https://via.placeholder.com/100" class="w-16 h-16 rounded-md object-cover bg-slate-700">
                <div>
                    <div class="font-bold">ヒロイン (アイ)</div>
                    <div class="text-xs text-slate-400">Ref: Design Sheet</div>
                </div>
            </div>

            <div class="drag-area rounded-xl p-6 flex flex-col items-center justify-center text-slate-500 cursor-pointer h-32">
                <span class="text-2xl">+</span>
                <span class="text-xs mt-2">Upload Character Sheet</span>
            </div>
        </aside>

        <section class="flex-1 flex flex-col gap-4">
            <div class="glass p-6 rounded-xl">
                <h2 class="text-lg font-bold mb-3">Create New Scene</h2>
                <textarea class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 h-24" 
                placeholder="例：ヒロとアイが放課後の教室で喧嘩をしている。夕焼けが差し込んでいる。ヒロは泣きそうな顔で「どうしてわかってくれないんだ」と叫ぶ。アイは冷ややかな目で見ている。"></textarea>
                <div class="flex justify-end mt-3">
                    <button class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition flex items-center gap-2" onclick="generateManga()">
                        <span>✨ Generate Manga</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto pr-2">
                <div id="manga-grid" class="grid grid-cols-2 gap-4 hidden">
                    <div class="glass p-2 rounded-xl">
                        <div class="aspect-video bg-slate-800 rounded-lg mb-2 relative overflow-hidden group">
                            <img src="https://via.placeholder.com/800x450/1e293b/475569?text=Genereting..." class="w-full h-full object-cover opacity-50">
                            <div class="absolute inset-0 flex items-center justify-center text-slate-400 text-sm">Processing Prompt...</div>
                        </div>
                        <p class="text-sm text-slate-300 p-2">Panel 1: "Conflict in the Sunset"</p>
                    </div>
                    <div class="glass p-2 rounded-xl">
                        <div class="aspect-video bg-slate-800 rounded-lg mb-2 relative">
                             <img src="https://via.placeholder.com/800x450/1e293b/475569?text=Waiting..." class="w-full h-full object-cover opacity-30">
                        </div>
                        <p class="text-sm text-slate-300 p-2">Panel 2: "Cold Gaze"</p>
                    </div>
                </div>
                
                <div id="empty-state" class="h-full flex items-center justify-center text-slate-500 flex-col">
                    <div class="text-4xl mb-4">🎨</div>
                    <p>Enter a prompt to start creating.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function generateManga() {
            const grid = document.getElementById('manga-grid');
            const empty = document.getElementById('empty-state');
            
            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.classList.add('animate-pulse');

            // ここでバックエンドAPIを叩く想定
            setTimeout(() => {
                grid.classList.remove('animate-pulse');
                alert("【ここがビジネスの肝】\n\nここから先はサーバー側で「IP-Adapter」と「Gemini」が連携して動きます。\nあなたのキャラ設定画を参照し、崩れることなく漫画コマを生成します。");
            }, 1500);
        }
    </script>
</body>
